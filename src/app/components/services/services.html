<section id="services" class="section-pad">
  <div class="container-x">
    <app-section-heading
      eyebrow="What we do"
      title="Services built to"
      highlight="ship & scale"
      subtitle="From a single landing page to full custom platforms — every build is fast, secure and crafted to convert."
    />

    <div class="mt-16 grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (service of services; track service.title; let i = $index) {
        <article
          appReveal
          [delay]="(i % 4) * 80"
          appTilt
          class="group relative overflow-hidden rounded-3xl p-[1px]"
          [style.background]="
            'linear-gradient(140deg, ' + service.accent + '55, transparent 45%)'
          "
        >
          <div
            class="relative h-full rounded-3xl border border-[var(--border)] bg-white/80 p-6 backdrop-blur-xl transition-all duration-300 dark:bg-night/80"
          >
            <!-- glow on hover -->
            <span
              class="pointer-events-none absolute -right-10 -top-10 h-24 w-24 rounded-full opacity-0 blur-2xl transition-opacity duration-300 group-hover:opacity-70"
              [style.background]="service.accent"
            ></span>

            <span
              class="grid h-12 w-12 place-items-center rounded-2xl text-lg text-white shadow-soft"
              [style.background]="
                'linear-gradient(135deg, ' + service.accent + ', ' + service.accent + 'bb)'
              "
            >
              <i [class]="service.icon"></i>
            </span>

            <h3 class="mt-5 font-display text-lg font-semibold">{{ service.title }}</h3>
            <p class="mt-2 text-sm leading-relaxed text-muted">{{ service.description }}</p>

            <span
              class="mt-4 inline-flex items-center gap-1.5 text-sm font-semibold text-brand-primary opacity-0 transition-all duration-300 group-hover:opacity-100"
            >
              Learn more <i class="fa-solid fa-arrow-right text-xs"></i>
            </span>
          </div>
        </article>
      }
    </div>
  </div>
</section>
