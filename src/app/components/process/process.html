<section id="process" class="section-pad">
  <div class="container-x">
    <app-section-heading
      eyebrow="How we work"
      title="A proven process from"
      highlight="idea to launch"
      subtitle="Seven clear stages, weekly demos and zero surprises — you always know exactly where your project stands."
    />

    <div class="relative mt-16">
      <!-- Center connector line -->
      <div
        class="absolute left-[1.45rem] top-0 hidden h-full w-px bg-gradient-to-b from-brand-primary via-brand-secondary to-brand-accent lg:left-1/2 lg:block lg:-translate-x-1/2"
        aria-hidden="true"
      ></div>

      <ol class="grid gap-6 lg:gap-3">
        @for (step of steps; track step.step; let i = $index; let even = $even) {
          <li
            appReveal
            [variant]="even ? 'left' : 'right'"
            class="relative grid items-center gap-4 pl-14 lg:grid-cols-2 lg:gap-12 lg:pl-0"
          >
            <!-- Card -->
            <div
              class="card-surface rounded-3xl p-6 transition-transform duration-300 hover:-translate-y-1"
              [ngClass]="even ? 'lg:order-1 lg:text-right' : 'lg:order-2'"
            >
              <div class="flex items-center gap-3" [ngClass]="even ? 'lg:flex-row-reverse' : ''">
                <span
                  class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-gradient-to-br from-brand-primary to-brand-secondary text-white"
                >
                  <i [class]="step.icon"></i>
                </span>
                <div>
                  <span class="font-display text-xs font-bold tracking-widest text-brand-primary"
                    >STEP {{ step.step }}</span
                  >
                  <h3 class="font-display text-lg font-semibold">{{ step.title }}</h3>
                </div>
              </div>
              <p class="mt-3 text-sm leading-relaxed text-muted">{{ step.description }}</p>
            </div>

            <!-- Spacer for the empty side on desktop -->
            <div class="hidden lg:block" [ngClass]="even ? 'lg:order-2' : 'lg:order-1'"></div>

            <!-- Node -->
            <span
              class="absolute left-[1.45rem] top-1/2 z-10 h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full border-4 border-[var(--bg)] bg-gradient-to-br from-brand-primary to-brand-accent lg:left-1/2"
              aria-hidden="true"
            ></span>
          </li>
        }
      </ol>
    </div>
  </div>
</section>
