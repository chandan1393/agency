<section id="portfolio" class="section-pad bg-soft">
  <div class="container-x">
    <app-section-heading
      eyebrow="Our work"
      title="Projects we're"
      highlight="proud of"
      subtitle="A snapshot of websites and platforms we've crafted across industries — each one fast, polished and built to perform."
    />

    <!-- Filters -->
    <div class="mt-12 flex flex-wrap justify-center gap-2" appReveal>
      @for (filter of filters; track filter) {
        <button
          type="button"
          (click)="setFilter(filter)"
          class="rounded-full border px-4 py-2 text-sm font-medium transition-all duration-300"
          [ngClass]="
            active() === filter
              ? 'border-transparent bg-gradient-to-r from-brand-primary to-brand-secondary text-white shadow-glow'
              : 'border-[var(--border)] text-muted hover:text-brand-primary hover:border-brand-primary/40'
          "
        >
          {{ filter }}
        </button>
      }
    </div>

    <!-- Grid -->
    <div class="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
      @for (item of items(); track item.title) {
        <article
          appReveal
          variant="zoom"
          class="group relative overflow-hidden rounded-3xl border border-[var(--border)] shadow-soft"
        >
          <!-- Cover -->
          <div
            class="relative flex h-56 items-center justify-center bg-gradient-to-br"
            [ngClass]="item.gradient"
          >
            <div class="absolute inset-0 bg-grid-dark bg-[size:26px_26px] opacity-30"></div>
            <i [class]="item.icon" class="text-5xl text-white/90 drop-shadow"></i>
            <span
              class="absolute left-4 top-4 rounded-full bg-black/25 px-3 py-1 text-xs font-semibold text-white backdrop-blur"
              >{{ item.category }}</span
            >

            <!-- Hover overlay -->
            <div
              class="absolute inset-0 flex flex-col items-center justify-center gap-3 bg-night/70 px-6 text-center opacity-0 backdrop-blur-sm transition-all duration-300 group-hover:opacity-100"
            >
              <h3 class="font-display text-lg font-bold text-white">{{ item.title }}</h3>
              <p class="text-sm text-white/80">{{ item.description }}</p>
              <div class="mt-1 flex gap-2">
                <button
                  type="button"
                  class="rounded-full bg-white px-4 py-2 text-xs font-semibold text-ink transition hover:scale-105"
                >
                  <i class="fa-solid fa-up-right-from-square mr-1"></i> Live Demo
                </button>
                <button
                  type="button"
                  class="rounded-full border border-white/40 px-4 py-2 text-xs font-semibold text-white transition hover:scale-105"
                >
                  View Details
                </button>
              </div>
            </div>
          </div>

          <!-- Caption -->
          <div class="flex items-center justify-between bg-white/80 px-5 py-4 dark:bg-night/80">
            <div>
              <h3 class="font-display text-base font-semibold">{{ item.title }}</h3>
              <p class="text-xs text-muted">{{ item.category }}</p>
            </div>
            <i class="fa-solid fa-arrow-right text-brand-primary transition-transform group-hover:translate-x-1"></i>
          </div>
        </article>
      }
    </div>
  </div>
</section>
